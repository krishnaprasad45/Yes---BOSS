# Production stack for a single EC2 host: Postgres + the backend.
# Recordings live in S3 (or B2) — no MinIO here, to spare RAM.
#
#   docker compose -f docker-compose.prod.yml --env-file apps/backend/.env.production up -d --build
#
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./apps/backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

volumes:
  pgdata:
